name: Build and Release Bilibili

on:
  push:
    branches:
      - main
    paths:
      - "src/main/resources/release.json" # 只有修改这个文件时才触发，防止频繁构建

jobs:
  build:
    runs-on: ubuntu-latest
    # 必须添加权限配置，否则无法创建 Release
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      # 从 release.json 读取版本号 (tag_main)
      - name: Read tag_main
        id: tag_main
        uses: ashley-taylor/read-json-property-action@v1.2
        with:
          path: ./src/main/resources/release.json
          property: tag_main

      # 从 release.json 读取展示版本号 (tag_latest)
      - name: Read tag_latest
        id: tag_latest
        uses: ashley-taylor/read-json-property-action@v1.2
        with:
          path: ./src/main/resources/release.json
          property: tag_latest

      # 读取 release.info 作为 Release 说明内容
      - name: Read description
        id: description
        uses: juliangruber/read-file-action@v1
        with:
          path: ./src/main/resources/release.info

      - name: Build with Maven
        run: mvn -B package --file pom.xml -Dmaven.test.skip=true

      - name: Prepare Release Package (ZIP)
        run: |
          # 1. 规范化命名
          mv ./target/bilibili-${{ steps.tag_main.outputs.value }}.jar bilibili-v${{ steps.tag_latest.outputs.value }}.jar
          
          # 2. 打包 ZIP，包含 jar、配置说明和文档
          zip -r "bilibili-v${{ steps.tag_latest.outputs.value }}.zip" \
                 "bilibili-v${{ steps.tag_latest.outputs.value }}.jar" \
                 "README.md" \
                 "LICENSE"
          
          # 如果你有额外的 config.json 或 docs 目录，取消下面行的注释
          # cp ./src/main/resources/config.json ./
          # zip "bilibili-v${{ steps.tag_latest.outputs.value }}.zip" config.json -r docs/

      - name: Create and Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: V${{ steps.tag_latest.outputs.value }}
          name: bilibili-v${{ steps.tag_latest.outputs.value }}
          body: ${{ steps.description.outputs.content }}
          draft: false
          prerelease: false
          files: |
            bilibili-v${{ steps.tag_latest.outputs.value }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
